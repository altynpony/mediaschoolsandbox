<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Агентность модели</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --purple: #7d45cf;
      --muted: #666;
      --line: #e0e0e0;
      --bg: #f9f9f9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--bg);
      color: #333;
      font-weight: 300;
      padding: 28px;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      margin-bottom: 22px;
    }

    .logo,
    .back {
      color: var(--muted);
      font-size: 13px;
      text-decoration: none;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
    }

    .slide {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 12px 34px rgba(51, 51, 51, 0.08);
    }

    .slide img {
      display: block;
      width: 100%;
      height: auto;
    }

    .sources {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    .sources a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      color: var(--purple);
      text-decoration: none;
    }

    @media (max-width: 680px) {
      body {
        padding: 18px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
  <link rel="stylesheet" href="ai-journalist-nav.css">
</head>
<body>
  <main class="page">
    <div class="topbar">
      <a class="logo" href="ai-journalist.html">pragueschool.media</a>
      <a class="back" href="vibecoder.html"><i class="fa-solid fa-arrow-left"></i> Roadmap</a>
    </div>

    <figure class="slide">
      <img src="assets/images/model-agency-rack.jpeg" alt="Одна модель = вся стойка">
    </figure>

    <div class="sources">
      <span>Исходные материалы:</span>
      <a href="https://chatgpt.com/s/m_6a0eeae44f3481918a121e3502348f99"><i class="fa-solid fa-link"></i> ChatGPT slide 1</a>
      <a href="https://chatgpt.com/s/m_6a0eeaf5ec988191b2f8d5e303ca02ff"><i class="fa-solid fa-link"></i> ChatGPT slide 2</a>
    </div>
  </main>

  <script src="ai-journalist-nav.js"></script>
</body>
</html>
